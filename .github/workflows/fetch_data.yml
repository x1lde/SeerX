name: Fetch Market Data # Name of the workflow

permissions:
  contents: write

on:
  schedule:
    - cron: '0 21 * * 1-5'  # Run at 21:00 UTC (4:00 PM EST) every weekday (Monday to Friday)
  workflow_dispatch:  # Allow manual triggering of the workflow

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6 
        with:
          python-version: '3.14'  # Specify the Python version to use 
        
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock and cryptocurrency data
        run: python src/fetch_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update market data"
          git push

      - name: Run trading engine
        env:
          ALPACA_API_KEY: ${{secrets.ALPACA_API_KEY}}
          ALPACA_SECRET_KEY: ${{secrets.ALPACA_SECRET_KEY}}
          SUPABASE_URL: ${{secrets.SUPABASE_URL}}
          SUPABASE_KEY: ${{secrets.SUPABASE_KEY}}
        run: python3 src/run_trading_engine.py